name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify PDF worker exists
        run: test -f public/pdf.worker.min.mjs

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: dummy-for-build
          STRIPE_SECRET_KEY: dummy-for-build
          STRIPE_PUBLISHABLE_KEY: dummy-for-build
          STRIPE_PRICE_ID: dummy-for-build
          RESEND_API_KEY: re_dummy-for-build
